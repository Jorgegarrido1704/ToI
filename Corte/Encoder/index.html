  <body>

                    </li>
                    <li class="list-group-item inline justify-content-between">
                        <button type="button" class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight4" aria-controls="offcanvasRight4" onclick="getdata('M4')">M4</button>
                    </li>
                    <li class="list-group-item inline justify-content-between">
                        <button type="button" class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight5" aria-controls="offcanvasRight5" onclick="getdata('M5')">M5</button>

                    </li>
                </ul>
            </div>

        <div class="row mt-5">
            <div class="col-12 lx-12">
                <div class="row">   
                    <div class="col-3 lx-3 lg-3 border">
                        <div class="M1">
                            <span id="maquinas"></span>
                            <h1 id="M1"><strong><span id="M1Result"></span>%</strong></h1>
                        </div>
                    </div>    
                     <div class="col-3 lx-3 lg-3 border">
                        <div class="M1">
                            <h3>Without MicroStops</h3>
                            <h1 id="M1"><strong><span id="M1ResultWo"></span>%</strong></h1>
                        </div>
                    </div>    
                </div>
           </div>
                <table class="table table-striped table-hover table-responsive">

                    </tr>    
                    </thead>
                    <tbody id="registroMaquina1">
                    
                    </tbody>
                </table>
           
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
<script> 

    let maquina = "M1";
    function getMaquina(maquina) {
       return maquina;
    }
    function getdata(maquina) {
    var url = "registromaquina1.php?maquina="+maquina; // Asegúrate de que esta ruta sea correcta y que el archivo PHP esté en el mismo directorio o ajusta la ruta según sea necesario
    fetch(url)
    .then(response => response.json())
    .then(data => {
       // console.log(data);
        var html = "";
        for (var i = 0; i < data.length; i++) {
            html += "<tr>";
            html += "<td> " + data[i].maquina + "</td>";
            html += "<td>" + data[i].estado + "</td>";
            html += "<td>" + data[i].fecha + "</td>";
            html += "</tr>";
        }
        document.getElementById("registroMaquina1").innerHTML = html;
    })
    .catch(error => console.log(error));
}
 
getdata(maquina);


setInterval(getdata(maquina), 2000);
function getMachines(maquina) {
    
    // Si están en la misma carpeta, solo pon el nombre del archivo
    const url = "getMachine1.php?maquina="+maquina; 
    
    fetch(url)
    .then(response => {
        // Esto te avisará en consola si el archivo realmente no existe
        if (!response.ok) {
            throw new Error("No se encontró el archivo PHP (Error " + response.status + ")");
        }
        return response.json(); // O .text() según lo que configuraste en tu PHP
    })
    .then(data => {
        console.log(data);

        document.getElementById("M1Result").innerHTML = data.OEE;
        document.getElementById("M1ResultWo").innerHTML = data.OEEWo;


    })
    .catch(error => console.error("Hubo un problema:", error));
}

getMachines(maquina);
console.log("Maquina: " + maquina);
setInterval(getMachines(maquina), 30000);



    </script>
