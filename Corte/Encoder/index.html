<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Maquinas Corte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container text-center align-items-center mt-4"> 
        <div class="row">
            <div class="col-12">
                <h1>Registros Maquina Corte</h1>
            </div>
            <div class="col-12 my-3">
                <ul class="list-group list-group-horizontal justify-content-center">
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M1')">M1</button></li>
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M2')">M2</button></li>
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M3')">M3</button></li>
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M4')">M4</button></li>
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M5')">M5</button></li>
                    <li class="list-group-item"><button type="button" class="btn btn-primary" onclick="cambiarMaquina('M6')">M6</button></li>
                </ul>
            </div>
        </div>  
        
        <div class="row mt-3 justify-content-center">
            <div class="col-3 border p-3 m-2">
                <span id="maquinas text-muted">OEE Current Machine</span>
                <h1 id="M1"><strong><span id="M1Result">0</span>%</strong></h1>
            </div>    
            <div class="col-3 border p-3 m-2">
                <h3>Without MicroStops</h3>
                <h1><strong><span id="M1ResultWo">0</span>%</strong></h1>
            </div>    
        </div>

        <div class="row mt-5">
            <table class="table table-striped table-hover table-responsive">
                <thead>
                    <tr>
                        <th scope="col">Machine</th>
                        <th scope="col">Status</th>
                        <th scope="col">Date Time</th>
                    </tr>    
                </thead>
                <tbody id="registroMaquina1">
                    </tbody>
            </table>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script> 
    let maquinaActual = "M1";

    function cambiarMaquina(nuevaMaquina) {
        maquinaActual = nuevaMaquina;
        getdata(maquinaActual);
        getMachines(maquinaActual);
    }

    function getdata(maquina) {
        // Assuming registromaquina1.php returns an array of logs for the table
        var url = "registromaquina1.php?maquina=" + maquina; 
        fetch(url)
        .then(response => response.json())
        .then(data => {
            var html = "";
            // Safe check to make sure data is an array
            if(Array.isArray(data)) {
                for (var i = 0; i < data.length; i++) {
                    html += "<tr>";
                    html += "<td>" + (data[i].maquina || maquina) + "</td>";
                    html += "<td>" + data[i].estado + "</td>";
                    html += "<td>" + data[i].fecha + "</td>";
                    html += "</tr>";
                }
            }
            document.getElementById("registroMaquina1").innerHTML = html;
        })
        .catch(error => console.error("Error fetching table logs:", error));
    }

    function getMachines(maquina) {
        const url = "getMachine1.php?maquina=" + maquina; 
        fetch(url)
        .then(response => {
            if (!response.ok) throw new Error("Error " + response.status);
            return response.json(); 
        })
        .then(data => {
            document.getElementById("M1Result").innerHTML = data.OEE;
            document.getElementById("M1ResultWo").innerHTML = data.OEEWo;
        })
        .catch(error => console.error("Error fetching machine OEE metrics:", error));
    }

    // Initial load
    getdata(maquinaActual);
    getMachines(maquinaActual);

    // CRITICAL FIX: Pass function references to setInterval, do not invoke them immediately!
    setInterval(() => getdata(maquinaActual), 2000);
    setInterval(() => getMachines(maquinaActual), 30000);
    </script>
</body>
</html>
